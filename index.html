<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B00">
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairRide - Rider and Driver</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
body {
  min-height: 100vh;
  background: linear-gradient(160deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  overflow: hidden;
}
#home {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(160deg,#0f172a,#1e3a5f);
}
.card {
  width: min(430px, 94vw);
  min-height: 620px;
  border-radius: 36px;
  background: rgba(255,255,255,.08);
  border: 1.5px solid rgba(255,255,255,.15);
  box-shadow: 0 35px 90px rgba(0,0,0,.45);
  padding: 44px 24px;
  text-align: center;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.logo{
    margin-bottom:20px;
}

.logo img{
    width:180px;
    height:auto;
    display:block;
    margin:0 auto;
}
.title {
  font-size: 34px;
  font-weight: 900;
  margin-bottom: 8px;
}
.sub {
  color: rgba(255,255,255,.68);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 38px;
}
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.option {
  border: 1.5px solid rgba(255,255,255,.18);
  background: rgba(255,255,255,.08);
  color: #fff;
  border-radius: 20px;
  padding: 26px 12px;
  cursor: pointer;
  transition: .2s;
}
.option:hover {
  transform: translateY(-2px);
  background: rgba(255,107,0,.2);
  border-color: #FF6B00;
}
.option.driver:hover {
  background: rgba(20,184,166,.2);
  border-color: #14b8a6;
}
.ico {
  display: block;
  font-size: 42px;
  margin-bottom: 10px;
}
.otitle {
  font-weight: 900;
  font-size: 16px;
}
.osub {
  color: rgba(255,255,255,.55);
  font-size: 12px;
  margin-top: 4px;
}
#bar {
  position: fixed;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: none;
  gap: 6px;
  padding: 6px;
  border-radius: 999px;
  background: rgba(17,24,39,.92);
  border: 1px solid rgba(255,255,255,.15);
}
#bar button {
  border: none;
  border-radius: 999px;
  padding: 9px 14px;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  color: rgba(255,255,255,.72);
  background: transparent;
}
#bar button.active {
  background: #fff;
  color: #111827;
}
.app {
  position: fixed;
  inset: 0;
  display: none;
  background: #111827;
}
.app.active {
  display: block;
}
iframe {
  width: 100%;
  height: 100vh;
  border: 0;
  display: block;
}
</style>
</head>
<body>

<div id="home">
  <div class="card">
    <div class="logo">
    <img src="logo.png" alt="FairRide Logo">
    </div>
    <div class="sub">Choose one option. Rider and Driver are inside this single HTML file.</div>
    <div class="options">
      <button class="option" onclick="openApp('rider')">
        <span class="ico">🙋</span>
        <div class="otitle">Rider</div>
        <div class="osub">Book ride</div>
      </button>
      <button class="option driver" onclick="openApp('driver')">
        <span class="ico">🚗</span>
        <div class="otitle">Driver</div>
        <div class="osub">Accept trip</div>
      </button>
    </div>
  </div>
</div>

<div id="riderApp" class="app">
  <iframe id="riderFrame"></iframe>
</div>

<div id="driverApp" class="app">
  <iframe id="driverFrame"></iframe>
</div>

function base64ToHtml(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return new TextDecoder("utf-8").decode(bytes);
}

let riderLoaded = false;
let driverLoaded = false;

function loadFrame(mode) {
  if (mode === "rider" && !riderLoaded) {
    document.getElementById("riderFrame").srcdoc = base64ToHtml(riderBase64);
    riderLoaded = true;
  }
  if (mode === "driver" && !driverLoaded) {
    document.getElementById("driverFrame").srcdoc = base64ToHtml(driverBase64);
    driverLoaded = true;
  }
}

function openApp(mode) {
  loadFrame(mode);

  document.getElementById("home").style.display = "none";
  

  document.getElementById("riderApp").classList.toggle("active", mode === "rider");
  document.getElementById("driverApp").classList.toggle("active", mode === "driver");

  var rb=document.getElementById("riderBtn"); if(rb) rb.classList.toggle("active", mode==="rider");
  var db=document.getElementById("driverBtn"); if(db) db.classList.toggle("active", mode==="driver");
}

function goHome() {
  document.getElementById("riderApp").classList.remove("active");
  document.getElementById("driverApp").classList.remove("active");
  
  document.getElementById("home").style.display = "flex";
}
</script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js");
  });
}
</script>
